services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: dialecta
      POSTGRES_PASSWORD: dialecta
      POSTGRES_DB: dialecta
    ports:
      - "5432:5432"
    volumes:
      - dialecta_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dialecta -d dialecta"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      ENVIRONMENT: development
      DATABASE_URL: postgresql+asyncpg://dialecta:dialecta@postgres:5432/dialecta
      TOKEN_ENCRYPTION_KEY: ${TOKEN_ENCRYPTION_KEY:-dev-only-replace-me-32bytes-min--}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      USE_DEMO_FALLBACK: "true"
      CORS_ORIGINS: '["http://localhost:3000","chrome-extension://*"]'
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  dialecta_pg:
