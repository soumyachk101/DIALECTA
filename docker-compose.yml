services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: dialecta
      POSTGRES_PASSWORD: dialecta
      POSTGRES_DB: dialecta
    ports:
      - "5432:5432"
    volumes:
      - dialecta_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dialecta -d dialecta"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  dialecta_pg:
