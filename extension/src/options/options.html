<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>DIALECTA · Settings</title>
    <link rel="stylesheet" href="../popup/popup.css" />
  </head>
  <body>
    <main style="width:480px;padding:24px;">
      <h1 style="font:600 16px/1 'JetBrains Mono', monospace;color:#7C3AED;margin:0 0 16px">DIALECTA · Settings</h1>
      <section>
        <h2 style="font:600 11px/1 'JetBrains Mono', monospace;letter-spacing:0.2em;color:#8B8D98;margin:18px 0 8px">CONNECTED ACCOUNTS</h2>
        <ul id="accounts" style="list-style:none;padding:0;margin:0;display:flex;flex-direction:column;gap:6px;"></ul>
      </section>
      <section>
        <h2 style="font:600 11px/1 'JetBrains Mono', monospace;letter-spacing:0.2em;color:#8B8D98;margin:18px 0 8px">AGENT TUNING</h2>
        <div id="sliders"></div>
      </section>
      <section>
        <h2 style="font:600 11px/1 'JetBrains Mono', monospace;letter-spacing:0.2em;color:#8B8D98;margin:18px 0 8px">STATED VALUES</h2>
        <textarea id="values" rows="5" style="width:100%;background:#13141A;color:#F4F4F6;border:1px solid #23252E;border-radius:4px;padding:10px;font:400 13px/1.4 'Space Grotesk',sans-serif"></textarea>
      </section>
    </main>
    <script type="module" src="options.ts"></script>
  </body>
</html>
